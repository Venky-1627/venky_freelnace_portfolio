<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venky — AI-Driven Web & Automation</title>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a0f;color:#e8e6dc;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0a0f}
::-webkit-scrollbar-thumb{background:#6a9bcc44;border-radius:3px}
:root{--bg-deep:#0a0a0f;--bg-card:#13131a;--bg-elevated:#1a1a25;--border:#ffffff0d;--accent:#6a9bcc;--accent-glow:#6a9bcc44;--text-primary:#faf9f5;--text-secondary:#b0aea5;--text-muted:#6b6a65;--glass:rgba(18,18,30,0.6);--radius:20px;--radius-lg:28px;--trans:cubic-bezier(0.16,1,0.3,1)}
h1{font-size:clamp(2.5rem,6vw,5.5rem);font-weight:700;line-height:1.05;letter-spacing:-0.03em}
h2{font-size:clamp(2rem,4vw,3.5rem);font-weight:700;line-height:1.15;letter-spacing:-0.02em}
h3{font-size:1.5rem;font-weight:600;line-height:1.3}
.gradient-text{background:linear-gradient(135deg,#faf9f5 0%,#6a9bcc 50%,#788c5d 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.container{max-width:1200px;margin:0 auto;padding:0 2rem}
.section{padding:6rem 0;position:relative;z-index:1}
.glass-card{background:var(--glass);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border:1px solid var(--border);border-radius:var(--radius-lg);transition:all .4s var(--trans)}
.glass-card:hover{border-color:#ffffff1a;box-shadow:0 20px 60px -20px #0006,inset 0 0 0 1px #ffffff0a}
#three-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.25rem 0;transition:all .4s var(--trans)}
.nav.scrolled{background:rgba(10,10,15,.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);padding:.75rem 0}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:0 2rem}
.nav-logo{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;cursor:pointer;transition:transform .3s var(--trans)}
.nav-logo:hover{transform:scale(1.05)}
.nav-links{display:flex;gap:2rem;align-items:center}
.nav-links a{color:var(--text-secondary);text-decoration:none;font-size:.9rem;font-weight:500;transition:color .3s;position:relative;background:none;border:none;font-family:inherit;cursor:pointer}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--accent);transition:width .3s var(--trans)}
.nav-links a:hover{color:var(--text-primary)}
.nav-links a:hover::after{width:100%}
.btn{padding:.7rem 1.6rem;border-radius:100px;font-weight:600;font-size:.9rem;cursor:pointer;border:none;transition:all .3s var(--trans);text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#7aadd8;transform:translateY(-2px);box-shadow:0 10px 30px -10px var(--accent-glow)}
.btn-glass{background:var(--glass);border:1px solid var(--border);color:var(--text-primary)}
.btn-glass:hover{border-color:#ffffff2a;transform:translateY(-2px);background:rgba(255,255,255,.08)}
.hero{min-height:100dvh;display:flex;align-items:center;position:relative;z-index:1}
.hero-content{max-width:700px}
.hero-badge{display:inline-flex;align-items:center;gap:.6rem;padding:.5rem 1.2rem;background:var(--glass);border:1px solid var(--border);border-radius:100px;font-size:.85rem;color:var(--text-secondary);margin-bottom:2rem;animation:fadeInUp .8s var(--trans) both}
.hero-badge .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 12px #4ade8088;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 8px #4ade8088}50%{box-shadow:0 0 20px #4ade80aa}}
.hero h1{animation:fadeInUp .8s var(--trans) .1s both;margin-bottom:1.5rem}
.hero p{font-size:1.15rem;line-height:1.7;color:var(--text-secondary);max-width:560px;margin-bottom:2.5rem;animation:fadeInUp .8s var(--trans) .2s both}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;animation:fadeInUp .8s var(--trans) .3s both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-top:3rem}
.service-card{padding:2.5rem 2rem;position:relative;overflow:hidden;cursor:default}
.service-card::before{content:'';position:absolute;inset:0;background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),var(--accent-glow),transparent 60%);opacity:0;transition:opacity .4s}
.service-card:hover::before{opacity:1}
.service-card>*{position:relative;z-index:1}
.service-icon{width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:var(--accent-glow);border-radius:16px;margin-bottom:1.5rem;font-size:1.5rem;transition:transform .3s var(--trans)}
.service-card:hover .service-icon{transform:scale(1.1) rotate(-5deg)}
.service-card h3{margin-bottom:.75rem}
.service-card p{color:var(--text-secondary);line-height:1.6;font-size:.95rem}
.work-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem;margin-top:3rem}
.work-card{border-radius:var(--radius-lg);overflow:hidden;position:relative;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);transition:all .4s var(--trans)}
.work-card:hover{border-color:#ffffff1a;transform:translateY(-8px);box-shadow:0 30px 60px -20px #000a}
.work-image{width:100%;height:220px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--text-muted);overflow:hidden;position:relative}
.work-image img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.work-info{padding:1.5rem}
.work-tag{display:inline-block;padding:.25rem .75rem;background:var(--accent-glow);color:var(--accent);border-radius:100px;font-size:.75rem;font-weight:600;margin-bottom:.75rem}
.work-info h3{font-size:1.2rem;margin-bottom:.5rem}
.work-info p{color:var(--text-secondary);font-size:.9rem;line-height:1.5}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text-muted)}
.empty-state .icon{font-size:3rem;margin-bottom:1rem;opacity:.5}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;margin-top:2rem}
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.stat-card{padding:2rem 1.5rem;text-align:center}
.stat-number{font-size:2.5rem;font-weight:800;letter-spacing:-0.03em}
.stat-label{color:var(--text-secondary);font-size:.85rem;margin-top:.25rem}
.contact-section{text-align:center}
.contact-card{max-width:500px;margin:2rem auto 0;padding:3rem 2rem}
.contact-item{display:flex;align-items:center;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border)}
.contact-item:last-child{border-bottom:none}
.footer{text-align:center;padding:3rem 2rem;border-top:1px solid var(--border);color:var(--text-muted);font-size:.85rem;position:relative;z-index:1}
.page{display:none;min-height:100dvh}
.page.active{display:block}
.admin-layout{min-height:100dvh;display:flex}
.admin-sidebar{width:260px;background:var(--bg-card);border-right:1px solid var(--border);padding:2rem 1.5rem;position:fixed;height:100dvh;left:0;z-index:50;overflow-y:auto}
.admin-main{margin-left:260px;flex:1;padding:2rem;min-height:100dvh}
.admin-logo{font-size:1.3rem;font-weight:700;margin-bottom:2rem}
.admin-nav{display:flex;flex-direction:column;gap:.5rem}
.admin-nav a{padding:.75rem 1rem;border-radius:12px;color:var(--text-secondary);text-decoration:none;font-size:.9rem;transition:all .3s;cursor:pointer;display:block}
.admin-nav a:hover,.admin-nav a.active{background:var(--glass);color:var(--text-primary)}
.admin-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.form-group{margin-bottom:1.5rem}
.form-group label{display:block;margin-bottom:.5rem;color:var(--text-secondary);font-size:.85rem;font-weight:500}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:.75rem 1rem;background:var(--bg-deep);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-size:.95rem;font-family:inherit;transition:border-color .3s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.form-group textarea{min-height:100px;resize:vertical}
.work-list{display:flex;flex-direction:column;gap:1rem}
.work-list-item{display:flex;align-items:center;gap:1rem;padding:1rem;background:var(--bg-deep);border:1px solid var(--border);border-radius:12px;transition:all .3s}
.work-list-item:hover{border-color:#ffffff1a}
.work-list-thumb{width:80px;height:60px;border-radius:8px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--text-muted);overflow:hidden;flex-shrink:0}
.work-list-thumb img{width:100%;height:100%;object-fit:cover}
.work-list-info{flex:1;min-width:0}
.work-list-info h4{font-size:1rem;margin-bottom:.25rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.work-list-info span{font-size:.8rem;color:var(--text-muted)}
.work-list-actions{display:flex;gap:.5rem;flex-shrink:0}
.btn-sm{padding:.5rem 1rem;font-size:.8rem}
.btn-danger{background:#dc262620;color:#f87171;border:1px solid #dc262633}
.btn-danger:hover{background:#dc262633}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:2rem;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:1rem}
.upload-area:hover{border-color:var(--accent);background:var(--accent-glow)}
.upload-area p{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.preview-img{max-width:100%;max-height:200px;border-radius:12px;margin-top:1rem;display:block}
.login-container{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1}
.login-card{width:100%;max-width:400px;padding:3rem 2rem}
.login-card h2{margin-bottom:.5rem}
.login-card p{color:var(--text-secondary);margin-bottom:2rem}
.error-msg{color:#f87171;font-size:.85rem;padding:.75rem;background:#dc262615;border-radius:8px;margin-bottom:1rem;display:none}
.error-msg.show{display:block}
.toast{position:fixed;bottom:2rem;right:2rem;padding:1rem 1.5rem;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);font-size:.9rem;z-index:1000;opacity:0;transform:translateY(20px);transition:all .3s var(--trans);pointer-events:none;max-width:340px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:#4ade8044}
.toast.error{border-color:#f8717144}
@media(max-width:768px){.container{padding:0 1.25rem}.nav-links{display:none}.hero{min-height:90dvh;padding-top:5rem}.work-grid{grid-template-columns:1fr}.services-grid{grid-template-columns:1fr}.about-grid{grid-template-columns:1fr}.admin-sidebar{display:none}.admin-main{margin-left:0}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<canvas id="three-bg"></canvas>
<div class="toast" id="toast"></div>
<div id="page-root"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
